<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isolated Playlist Test</title>
  <script type="module" src="./components/playlist.js"></script>
  <link rel="stylesheet" href="./css/theme-futuristic.css">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: linear-gradient(180deg, #030308, #060a14);
      color: var(--fx-text);
      font-family: var(--fx-font-ui), system-ui, sans-serif;
    }
    body {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 10px;
      padding: 16px;
      box-sizing: border-box;
      overflow: hidden;
    }
    my-playlist {
      display: block;
      width: min(560px, 100%);
      height: calc(100vh - 170px);
      border: 1px solid rgba(0, 240, 255, 0.25);
      border-radius: 12px;
      padding: 8px;
      box-sizing: border-box;
      background: rgba(8, 16, 36, 0.75);
      box-shadow: 0 0 24px rgba(0, 240, 255, 0.08);
    }
    #log {
      font-size: 12px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <h1>Standalone playlist demo</h1>
  <div id="log">Actions: click track, drag/drop reorder, Delete to remove.</div>
  <my-playlist id="playlist"></my-playlist>

  <script>
    const playlist = document.getElementById('playlist');
    const log = document.getElementById('log');

    playlist.setTracks([
      { src: './assets/Kalimba.mp3', title: 'Kalimba', duration: 119 },
      { src: './assets/Boney M. - Sunny (Official Audio).mp3', title: 'Boney M. - Sunny' },
      { src: './assets/Chic ~ I Want Your Love 1978 Disco Purrfection Version.mp3', title: 'Chic - I Want Your Love' },
      { src: './assets/Dire Straits - Tunnel Of Love.mp3', title: 'Dire Straits - Tunnel Of Love' },
      { src: './assets/Fat Larry s Band - Act Like You Know.mp3', title: 'Fat Larry s Band - Act Like You Know' },
      { src: './assets/Natural Mystic (1977) - Bob Marley The Wailers.mp3', title: 'Bob Marley - Natural Mystic' }
    ]);

    playlist.addEventListener('play-track', (e) => {
      log.textContent = `play-track: index ${e.detail.index}`;
    });

    playlist.addEventListener('playlist-changed', (e) => {
      log.textContent = `playlist-changed: ${JSON.stringify(e.detail)}`;
    });
  </script>
</body>
</html>
